name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changed TypeScript files
        id: changed-ts
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          HEAD_SHA="${{ github.sha }}"
          CHANGED_TS_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\\.(ts|tsx)$' || true)

          {
            echo 'files<<EOF'
            echo "$CHANGED_TS_FILES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Type check changed files
        if: steps.changed-ts.outputs.files != ''
        shell: bash
        env:
          CHANGED_TS_FILES: ${{ steps.changed-ts.outputs.files }}
        run: |
          node -e "const fs=require('fs');const files=(process.env.CHANGED_TS_FILES||'').split('\\n').filter(Boolean);fs.writeFileSync('tsconfig.ci.changed.json', JSON.stringify({extends:'./tsconfig.json', include:files}, null, 2));"
          pnpm exec tsc --noEmit --project tsconfig.ci.changed.json

      - name: Skip type check
        if: steps.changed-ts.outputs.files == ''
        run: echo "No TypeScript files changed."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changed lintable files
        id: changed-lint
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          HEAD_SHA="${{ github.sha }}"
          CHANGED_LINT_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\\.(js|jsx|ts|tsx)$' || true)

          {
            echo 'files<<EOF'
            echo "$CHANGED_LINT_FILES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed files
        if: steps.changed-lint.outputs.files != ''
        shell: bash
        env:
          CHANGED_LINT_FILES: ${{ steps.changed-lint.outputs.files }}
        run: |
          mapfile -t files <<< "$CHANGED_LINT_FILES"
          pnpm exec eslint --max-warnings=100 "${files[@]}"

      - name: Skip lint
        if: steps.changed-lint.outputs.files == ''
        run: echo "No lintable files changed."

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changed formattable files
        id: changed-format
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi

          HEAD_SHA="${{ github.sha }}"
          CHANGED_FORMAT_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E '\\.(js|jsx|ts|tsx|json|css|md|cjs|mjs|yml|yaml)$' || true)

          {
            echo 'files<<EOF'
            echo "$CHANGED_FORMAT_FILES"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Check formatting on changed files
        if: steps.changed-format.outputs.files != ''
        shell: bash
        env:
          CHANGED_FORMAT_FILES: ${{ steps.changed-format.outputs.files }}
        run: |
          mapfile -t files <<< "$CHANGED_FORMAT_FILES"
          pnpm exec prettier --check "${files[@]}"

      - name: Skip format check
        if: steps.changed-format.outputs.files == ''
        run: echo "No formattable files changed."

  build:
    name: Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        env:
          CI: true
        run: pnpm run test
